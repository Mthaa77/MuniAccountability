name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: AGSA platform verification
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify AGSA fixtures
        run: npm run test:agsa-fixtures

      - name: Verify governance fixtures
        run: npm run test:governance-fixtures

      - name: Verify source search fixtures
        run: npm run test:source-search-fixtures

      - name: Verify validation gates
        run: npm run test:validation-gates

      - name: Verify source manifests
        run: npm run test:source-manifests

      - name: Verify annexure overlay contract
        run: npm run test:annexure-overlay

      - name: Verify workflow persistence boundary
        run: npm run test:workflow-persistence

      - name: Verify workflow migration artifacts
        run: npm run test:workflow-migration

      - name: Typecheck
        run: npm run typecheck -- --pretty false --incremental false

      - name: Build
        run: npm run build
