openapi: 3.0.3
info:
  title: MuniAccountability Command API
  version: 0.1.0
  description: Source-aware municipal oversight API for the AGSA-backed prototype.
servers:
  - url: /v1
    description: Versioned API rewrite
paths:
  /municipalities:
    get:
      summary: List municipalities
      parameters:
        - in: query
          name: province
          schema:
            type: string
      responses:
        '200':
          description: Municipality list with metadata
  /municipalities/{id}:
    get:
      summary: Get municipality profile
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Municipality profile
        '404':
          description: Municipality not found
  /municipalities/{id}/case-file:
    get:
      summary: Get Municipality 360 case file
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Case file with findings, actions, material irregularities and audit history
  /intervention-queue:
    get:
      summary: List ranked intervention queue items
      responses:
        '200':
          description: Source-backed intervention queue
  /actions:
    get:
      summary: List source-backed actions
      responses:
        '200':
          description: Action list
  /actions/drafts:
    get:
      summary: List draft actions
      responses:
        '200':
          description: Draft action store
    post:
      summary: Create a draft action
      responses:
        '201':
          description: Draft action accepted
  /agsa/documents:
    get:
      summary: List AGSA source documents
      responses:
        '200':
          description: AGSA source document catalogue
  /agsa/findings:
    get:
      summary: List AGSA findings
      responses:
        '200':
          description: AGSA findings with review overlays
  /findings:
    get:
      summary: List detailed finding cards
      responses:
        '200':
          description: Finding cards with source links
  /findings/{id}:
    get:
      summary: Get finding detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Finding detail
        '404':
          description: Finding not found
  /search:
    get:
      summary: Source-locked search
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 8
      responses:
        '200':
          description: Search results with confidence, source and review state
  /assistant/query:
    post:
      summary: Source-locked assistant query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                question:
                  type: string
      responses:
        '200':
          description: Source-backed answer or refusal
  /validation:
    get:
      summary: Source validation summary
      responses:
        '200':
          description: Annexure and Treasury validation status
  /production-readiness:
    get:
      summary: Production readiness preflight
      responses:
        '200':
          description: Production readiness gates and blockers
  /production-evidence:
    get:
      summary: Production evidence pack
      responses:
        '200':
          description: Operator evidence checklist and unlock gates
  /production-evidence/reviews:
    get:
      summary: List production evidence review decisions
      responses:
        '200':
          description: Review decisions
    post:
      summary: Record production evidence review
      responses:
        '201':
          description: Review saved
  /municheck:
    get:
      summary: List public-safe MuniCheck profiles
      responses:
        '200':
          description: Public-safe profiles
  /municheck/{id}:
    get:
      summary: Get public-safe MuniCheck profile
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Public profile
  /munidata:
    get:
      summary: Endpoint catalogue and schema caveats
      responses:
        '200':
          description: API catalogue
components:
  securitySchemes:
    FirebaseRoleClaim:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID token
security: []
